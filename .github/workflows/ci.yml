name: Python CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Create storage directory
      run: mkdir -p storage/results

    - name: Run Unit Tests
      run: |
        pytest tests/test_main.py

    - name: Run Scheduling Integration Tests
      run: |
        pytest tests/integration/test_scheduling.py

    - name: Run Provider Integration Tests (using VCR cassettes if available)
      env:
        GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      run: |
        pytest tests/integration/test_endpoints.py
